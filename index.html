<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>📸 Dubaï Photo™</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <h2>📸 Dubaï Photo™</h2>

    <video id="video" autoplay playsinline></video>

    <br>

    <button id="btnCam">Allumer la Caméra</button>
    <button id="btnPhoto">Prendre une Photo</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="grid">
	    <div class="gauche">
		    <div id="list">
		    </div>
	    </div>
	    <div class="droite">
		    Ajouter un nouveau fichier/dossier.
		    <input type="text" id="nom" placeholder="Entrez le nom à afficher">
		    <input type="text" id="fichier" placeholder="Entrez l'url du fichier">
		    <input type="text" id="feuille" placeholder="Entrez le nom de la feuille, ex: Feuille 1">
		    <button id="btnAjouter">Ajouter</button>
	    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
